name: SDK Package

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Verify package import
        run: python -c "from veloryn.xray import analyze_structured, analyze_raw; assert callable(analyze_structured); assert callable(analyze_raw)"
